name: Release Claw Sheath

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
  workflow_dispatch:

jobs:
  build:
    name: Build Verifier Binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write # required for softprops/action-gh-release to create releases
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: src/verifier/go.sum

      - name: Build Binaries
        run: |
          chmod +x scripts/build_releases.sh
          ./scripts/build_releases.sh

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: releases/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
